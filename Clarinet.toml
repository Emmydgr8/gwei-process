[project]
name = "gwei-process"
authors = ["Blockchain Developer <developer@gwei.io>"]
description = "Cross-Chain Token Exchange and Transfer Protocol"
telemetry = false
requirements = []
[contracts.gwei-exchange]
path = "contracts/gwei-exchange.clar"
depends_on = []

[repl]
costs_version = 2
parser_version = 2

[repl.analysis]
passes = ["check_checker"]

[repl.analysis.check_checker]
strict = false
trusted_sender = false
trusted_caller = false
callee_filter = false
